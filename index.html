<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马年行大运</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            font-family: "微软雅黑", sans-serif;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .pic {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            display: block;
            border-radius: 10px;
        }
        .title {
            text-align: center;
            margin-top: 10px;
            font-size: 18px;
            color: #666;
        }
        .bless {
            margin-top: 30px;
            text-align: center;
            font-size: 16px;
            line-height: 1.8;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="meizhao.jpg" class="pic" alt="马照">
        <div class="title">马照</div>

        <div class="bless">
            马年行大运，前程似锦路路通<br>
            一马当先事事顺，马到成功万事兴<br>
            龙马精神身体健，策马扬鞭步步高<br>
            马年吉祥，喜乐常伴，岁岁平安
        </div>
    </div>
</body>
</html>
