<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马年行大运</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            font-family: "微软雅黑", sans-serif;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .pic {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            display: block;
            border-radius: 10px;
        }
        .title {
            text-align: center;
            margin-top: 10px;
            font-size: 18px;
            color: #666;
        }
        .bless {
            margin-top: 30px;
            text-align: center;
            font-size: 16px;
            line-height: 1.8;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="meizhao.jpg" class="pic" alt="马照">
        <div class="title">马照</div>

        <div class="bless">
            雨是天空的叹息，马是荒原的过客。我们都在独自奔赴，一场没有终点的雨季。<br>
            不要试图靠近这匹马。它身上有潮湿的风，和一段不敢声张的过往。<br>
            迷雾中独行的马，不渴望草原，只渴望清醒的孤独。<br>
        </div>
    </div>
</body>
</html>
